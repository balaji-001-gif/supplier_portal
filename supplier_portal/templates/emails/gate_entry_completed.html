<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #334155; line-height: 1.6;">
    <div style="max-width: 600px; margin: 0 auto; padding: 24px;">
        <div style="background: #16a34a; color: white; padding: 20px; border-radius: 12px 12px 0 0;">
            <h2 style="margin: 0; font-size: 18px;">Gate Entry Completed</h2>
        </div>
        <div style="background: white; border: 1px solid #e2e8f0; border-top: none; padding: 24px; border-radius: 0 0 12px 12px;">
            <p>Dear Team,</p>
            <p>Gate entry <strong>{{ doc.name }}</strong> has been completed.</p>

            <table style="width: 100%; border-collapse: collapse; margin: 16px 0;">
                <tr>
                    <td style="padding: 8px 12px; font-size: 12px; color: #64748b; border-bottom: 1px solid #f1f5f9;">Supplier</td>
                    <td style="padding: 8px 12px; font-size: 13px; font-weight: 600; border-bottom: 1px solid #f1f5f9;">{{ doc.supplier_name }}</td>
                </tr>
                <tr>
                    <td style="padding: 8px 12px; font-size: 12px; color: #64748b; border-bottom: 1px solid #f1f5f9;">ASN Reference</td>
                    <td style="padding: 8px 12px; font-size: 13px; font-weight: 600; border-bottom: 1px solid #f1f5f9;">{{ doc.asn_reference }}</td>
                </tr>
                <tr>
                    <td style="padding: 8px 12px; font-size: 12px; color: #64748b; border-bottom: 1px solid #f1f5f9;">Vehicle</td>
                    <td style="padding: 8px 12px; font-size: 13px; font-weight: 600; border-bottom: 1px solid #f1f5f9;">{{ doc.vehicle_no }}</td>
                </tr>
                <tr>
                    <td style="padding: 8px 12px; font-size: 12px; color: #64748b; border-bottom: 1px solid #f1f5f9;">Purchase Receipt</td>
                    <td style="padding: 8px 12px; font-size: 13px; font-weight: 600; border-bottom: 1px solid #f1f5f9;">{{ doc.purchase_receipt or 'Draft' }}</td>
                </tr>
            </table>

            <p style="font-size: 12px; color: #94a3b8; margin-top: 24px;">This is an automated notification from the Supplier Portal.</p>
        </div>
    </div>
</body>
</html>
